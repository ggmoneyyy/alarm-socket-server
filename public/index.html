<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alarm Clocks - Ring-a-Ding-Ding!</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <link href="https://fonts.cdnfonts.com/css/digital-7-mono" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="visualizerMode" class="hidden">
        <canvas id="particleCanvas"></canvas>
        <button class="close-visualizer" onclick="toggleVisualizer()" title="Exit Visualizer">✕</button>
        <div id="tetrisLine" class="laser-line"></div>
        <div id="visClock" class="visualizer-clock">00:00:00</div>
        <div id="fallingBlocksContainer"></div>
    </div>

    <div id="alarmOverlay" class="modal-overlay hidden ringing-mode" style="z-index: 10000;">
        <div class="ringing-content">
            <div id="ringingTime" class="big-time">00:00:00</div>
            <div id="ringingLabel" class="big-label">ALARM</div>
            <button class="stop-btn" onclick="stopAlarm()">STOP ALARM</button>
        </div>
    </div>

    <div id="creatorOverlay" class="modal-overlay hidden" onclick="if(event.target === this) closeCreator()" style="z-index: 9999;">
        <section id="creatorSection" class="alarm-creator">
            <button class="btn-icon close-modal-btn" onclick="closeCreator()" style="position: absolute; top: 15px; right: 15px; color: white; z-index: 10;">✕</button>
            <h3 id="formTitle" style="margin-top:0; font-size: 1.1rem; margin-bottom: 20px; opacity: 0.9;">CREATE NEW ALARM</h3>
            
            <div class="input-row">
                <div class="field">
                    <label>Time (HH:MM:SS)</label>
                    <input type="time" id="alarmTime" step="1" required>
                </div>
                <div class="field">
                    <label>Label</label>
                    <input type="text" id="alarmLabel" placeholder="Alarm Label">
                </div>
                <div class="field">
                    <label>Sound Effect</label>
                    <select id="alarmSound" onchange="previewSound()"></select>
                </div>
            </div>

            <div class="days-section">
                <div class="quick-select-row">
                    <button class="mini-btn" onclick="setDays('all')">All Days</button>
                    <button class="mini-btn" onclick="setDays('weekdays')">Weekdays</button>
                    <button class="mini-btn" onclick="setDays('weekends')">Weekends</button>
                    <button class="mini-btn" onclick="setDays('none')">Clear</button>
                </div>
                <div class="days-picker" id="daysPicker">
                    <label><input type="checkbox" value="1"> Mon</label>
                    <label><input type="checkbox" value="2"> Tue</label>
                    <label><input type="checkbox" value="3"> Wed</label>
                    <label><input type="checkbox" value="4"> Thu</label>
                    <label><input type="checkbox" value="5"> Fri</label>
                    <label><input type="checkbox" value="6"> Sat</label>
                    <label><input type="checkbox" value="0"> Sun</label>
                </div>
            </div>

            <div id="copyTargetWrapper" class="field hidden" style="margin-bottom: 15px; border-top:1px solid #334155; padding-top:10px;">
                <label style="color:var(--success); font-size:0.9rem;">↪ Copy To Profile:</label>
                <select id="copyTargetProfile" style="width:100%; margin-top:5px; border-color:var(--success);"></select>
            </div>

            <button id="submitBtn" class="add-btn" onclick="handleSubmit()">Add Alarm</button>
            <button id="cancelEditBtn" class="secondary hidden" style="width:100%; margin: 10px 0 0 0;" onclick="closeCreator()">Cancel</button>
        </section>
    </div>

    <div id="managerOverlay" class="modal-overlay hidden" onclick="if(event.target === this) closeManager()" style="z-index: 9999;">
        <div class="manager-window">
            <div class="manager-header">
                <h3 style="margin:0">Profile Manager</h3>
                <button class="btn-icon close-modal-btn" onclick="closeManager()">✕</button>
            </div>
            <div class="manager-body">
                <button class="create-profile-btn" onclick="createNewProfile()">➕ Create New Profile</button>
                <div id="managerList" class="profile-list"></div>
            </div>
        </div>
    </div>

    <div class="container">
        <header class="sticky-header" id="mainHeader">
            <div class="header-left">
                <h1>⏰ Ring-a-Ding-Ding!</h1>
                <div id="syncStatus" class="sync-status">
                    <span>Sync: Connecting...</span>
                </div>
            </div>
            
            <div class="header-center">
                <div id="liveClock" class="live-clock">00:00:00</div>
                <div id="nextAlarmDisplay" class="next-alarm-banner">--:--:--</div>
                <div id="followingAlarmDisplay" class="following-alarm"></div>
                <div style="margin-top: 15px; display: flex; justify-content: center; gap: 15px;">
                    <button id="followBtn" class="follow-btn" onclick="toggleFollow()">Follow</button>
                    <button class="follow-btn" style="border-color: var(--accent); color: var(--accent);" onclick="openCreator()">+ Alarm</button>
                </div>
            </div>
            
            <div class="header-right" style="display: flex; flex-direction: column; align-items: flex-end; gap: 6px;">
                
                <div style="display: flex; align-items: center; gap: 5px;">
                    <label style="font-size: 0.7rem; opacity: 0.7;">PROFILE:</label>
                    <select id="profileSelect" onchange="switchProfile(this.value)" style="padding: 2px 4px; font-size: 0.8rem; width: auto; background: var(--bg); color: var(--text); border: 1px solid var(--secondary); border-radius: 4px;"></select>
                    <button class="secondary" onclick="openManager()" style="font-size: 1rem; padding: 2px 6px; background: transparent; border: none; cursor: pointer;" title="Manage Profiles">⚙️</button>
                </div>
                
                <div style="display: flex; align-items: center; gap: 5px;">
                    <label style="font-size: 0.7rem; opacity: 0.7;">VISUALIZER:</label>
                    <select id="vizSelect" onchange="changeVisualizer(this.value)" style="padding: 2px 4px; font-size: 0.8rem; width: auto; background: var(--bg); color: var(--text); border: 1px solid var(--secondary); border-radius: 4px;">
                        <option value="tetris_effect">Tetris Effect</option>
                    </select>
                    <button class="secondary" onclick="toggleVisualizer()" style="font-size: 1.2rem; padding: 2px 6px; background: transparent; border: none; cursor: pointer;" title="Toggle Visualizer">🌌</button>
                </div>
                
                <div style="display: flex; align-items: center; gap: 10px; background: #1e293b; padding: 6px 10px; border-radius: 6px;">
                    <label style="font-size:0.6rem; color:var(--accent)">SIZE</label>
                    <input type="range" min="1" max="3" value="1" step="1" id="sizeSlider" oninput="updateGridSize(this.value)" style="width: 40px; accent-color: var(--accent); height: 4px; padding: 0;">
                    
                    <span style="color: #334155; margin: 0 5px;">|</span>
                    
                    <label style="font-size:0.6rem; color:var(--accent)">SORT</label>
                    <select id="sortOrder" onchange="updateSort(this.value)" style="padding:0; font-size:0.75rem; background: transparent; border:none; color: white; cursor: pointer; width: auto;">
                        <option value="earliest">Earliest</option>
                        <option value="latest">Latest</option>
                    </select>
                </div>

            </div>
        </header>
        
        <div id="alarmGrid" class="alarm-grid"></div>
    </div>

    <audio id="audioPreview"></audio>
    <audio id="mainAlarmAudio" loop></audio>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
